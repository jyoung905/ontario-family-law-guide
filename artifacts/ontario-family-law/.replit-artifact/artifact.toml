kind = "mobile"
previewPath = "/"
title = "Ontario Family Law Guide"
version = "1.0.0"
id = "artifacts/ontario-family-law"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24704

[services.development]
run = "pnpm --filter @workspace/ontario-family-law run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ontario-family-law", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ontario-family-law", "run", "serve" ]

[services.env]
PORT = "24704"
BASE_PATH = "/"
